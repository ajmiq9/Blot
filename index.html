<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>حاسبة البلوت</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  /* =========================================
     المتغيرات والألوان (ثيم داكن وفاتح مستقل)
     ========================================= */
  :root {
    /* الألوان الأساسية للمظهر الداكن */
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --text-muted: #8e8eab;
    --text-dim: #50506b;
    --danger: #ff4747;
    
    --radius: 20px;
    --radius-sm: 12px;

    /* --- لوحات الألوان (المظهر الداكن - نيون ساطع) --- */
    --p0-us-dark: #4fffb0; --p0-them-dark: #ff6b8a;
    --p1-us-dark: #4facfe; --p1-them-dark: #ff9a44;
    --p2-us-dark: #f5c842; --p2-them-dark: #b366ff;
    --p3-us-dark: #a8ff78; --p3-them-dark: #ff4747;

    /* --- لوحات الألوان (المظهر الفاتح - درجات هادئة ومريحة للعين) --- */
    /* 0: سماوي هادئ / أحمر ناعم */
    --p0-us-light: #0096c7; --p0-them-light: #e63946;
    /* 1: تركواز (أخضر مزرق) / برتقالي هادئ */
    --p1-us-light: #2a9d8f; --p1-them-light: #e76f51;
    /* 2: أزرق نيلي / بنفسجي هادئ */
    --p2-us-light: #4361ee; --p2-them-light: #b5179e;
    /* 3: أخضر غابات / أحمر قرمزي */
    --p3-us-light: #2d6a4f; --p3-them-light: #d90429;

    /* إعداد الألوان الافتراضية */
    --p0-us: var(--p0-us-dark); --p0-them: var(--p0-them-dark);
    --p1-us: var(--p1-us-dark); --p1-them: var(--p1-them-dark);
    --p2-us: var(--p2-us-dark); --p2-them: var(--p2-them-dark);
    --p3-us: var(--p3-us-dark); --p3-them: var(--p3-them-dark);

    /* تأثيرات التوهج للداكن فقط */
    --us-glow: rgba(79, 255, 176, 0.25);
    --them-glow: rgba(255, 107, 138, 0.25);
  }

  /* تبديل المتغيرات عند تفعيل المظهر الفاتح */
  body.light-theme {
    --bg: #f4f4f9;
    --surface: #ffffff;
    --surface2: #f0f0f5;
    --border: rgba(0,0,0,0.1);
    --text: #12121a;
    --text-muted: #50506b;
    --text-dim: #8e8eab;

    --p0-us: var(--p0-us-light); --p0-them: var(--p0-them-light);
    --p1-us: var(--p1-us-light); --p1-them: var(--p1-them-light);
    --p2-us: var(--p2-us-light); --p2-them: var(--p2-them-light);
    --p3-us: var(--p3-us-light); --p3-them: var(--p3-them-light);
  }

  /* ربط اللوحة المختارة بالألوان الرئيسية للتطبيق */
  body[data-palette="0"] { --us-color: var(--p0-us); --them-color: var(--p0-them); --us-glow: rgba(79,255,176,0.25); --them-glow: rgba(255,107,138,0.25); }
  body[data-palette="1"] { --us-color: var(--p1-us); --them-color: var(--p1-them); --us-glow: rgba(79,172,254,0.25); --them-glow: rgba(255,154,68,0.25); }
  body[data-palette="2"] { --us-color: var(--p2-us); --them-color: var(--p2-them); --us-glow: rgba(245,200,66,0.25); --them-glow: rgba(179,102,255,0.25); }
  body[data-palette="3"] { --us-color: var(--p3-us); --them-color: var(--p3-them); --us-glow: rgba(168,255,120,0.25); --them-glow: rgba(255,71,71,0.25); }

  /* =========================================
     التنسيقات العامة والأساسيات
     ========================================= */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.3s, color 0.3s;
  }

  .app { max-width: 480px; margin: 0 auto; padding: 15px 16px 40px; position: relative; z-index: 1; }

  /* =========================================
     لوحة النتائج العلوية
     ========================================= */
  .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; margin-bottom: 24px; margin-top: 20px; }
  .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 10px; text-align: center; position: relative; overflow: hidden; }
  .score-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--us-color); }
  .score-card.them::before { background: var(--them-color); }
  .score-label { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; color: var(--us-color); }
  .score-card.them .score-label { color: var(--them-color); }
  
  .score-value { font-size: 3.5rem; font-weight: 900; line-height: 1; }
  body:not(.light-theme) .score-card.us .score-value { color: #fff; text-shadow: 0 0 10px var(--us-glow); }
  body:not(.light-theme) .score-card.them .score-value { color: #fff; text-shadow: 0 0 10px var(--them-glow); }
  body.light-theme .score-card.us .score-value { color: var(--us-color); }
  body.light-theme .score-card.them .score-value { color: var(--them-color); }
  
  .score-value.bump { transform: scale(1.2); transition: 0.3s; }

  .vs-divider { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .vs-text { font-size: 0.9rem; font-weight: 800; color: var(--text-dim); }
  .btn-settings-inline { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; }
  .btn-speaker { background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; color: var(--text); }

  /* =========================================
     حقول الإدخال والأزرار
     ========================================= */
  .input-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
  .input-group { display: flex; flex-direction: column; gap: 8px; }
  .input-group label { font-size: 1rem; font-weight: 700; text-align: center; color: var(--us-color); }
  .input-group.them label { color: var(--them-color); }
  .input-group input { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 16px 10px; font-family: 'Tajawal'; font-size: 1.6rem; font-weight: 700; color: var(--text); text-align: center; width: 100%; outline: none; transition: 0.2s; }
  .input-group input:focus { border-color: var(--us-color); }
  
  .btn-register { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--us-color), var(--them-color)); border: none; border-radius: var(--radius-sm); font-family: 'Tajawal', sans-serif; font-size: 1.8rem; font-weight: 900; color: #fff; cursor: pointer; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
  .action-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; margin-top: 10px; }
  .btn-action { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; padding: 8px 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--text); cursor: pointer; transition: 0.2s; }
  .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

  /* =========================================
     سجل الجولات (الأرشيف اللحظي)
     ========================================= */
  .history-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; padding-top: 10px; }
  .history-list { list-style: none; max-height: 250px; overflow-y: auto; }
  .history-item { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; text-align: center; }
  .round-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 0.95rem; color: var(--text-muted); }
  .history-score.us { color: var(--us-color); font-weight: 800; font-size: 1.4rem; }
  .history-score.them { color: var(--them-color); font-weight: 800; font-size: 1.4rem; }
  .empty-state { padding: 30px; text-align: center; color: var(--text-dim); }

  /* =========================================
     النوافذ المنبثقة (Modals)
     ========================================= */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 380px; max-height: 90vh; overflow-y: auto; }
  .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .close-btn { background: none; border: none; color: var(--danger); font-size: 2rem; cursor: pointer; }
  
  .setting-group { margin-bottom: 15px; }
  .setting-group label { display: block; font-size: 0.9rem; margin-bottom: 8px; font-weight: 700; }
  .btn-toggle-theme, .btn-save-edit, .btn-new-game { width: 100%; padding: 12px; border-radius: 8px; border: none; font-family: 'Tajawal'; font-weight: 800; cursor: pointer; margin-top: 10px; }
  .btn-toggle-theme { background: var(--surface2); color: var(--text); }
  
  body:not(.light-theme) .btn-save-edit { background: var(--us-color); color: #000; }
  body.light-theme .btn-save-edit { background: var(--us-color); color: #fff; }

  /* =========================================
     أزرار اختيار الألوان (تم حل مشكلة الزوايا)
     ========================================= */
  .color-themes { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
  .color-btn { 
    width: 44px; height: 44px; 
    border-radius: 50%; 
    border: none; /* تمت إزالة الحدود لمنع تسرب الألوان */
    cursor: pointer; 
    transition: 0.2s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    overflow: hidden; /* هذا السطر يقص التدرج اللوني ليكون دائرياً 100% */
    padding: 0;
  }
  
  /* تقنية الحلقة الخارجية لتوضيح الاختيار بدون التأثير على شكل الدائرة */
  .color-btn.active { 
    transform: scale(1.15); 
    box-shadow: 0 0 0 3px var(--surface), 0 0 0 5px var(--text); 
  }
  
  /* التدرجات اللونية نظيفة وحادة */
  .color-btn[data-idx="0"] { background: linear-gradient(135deg, var(--p0-us) 0%, var(--p0-us) 50%, var(--p0-them) 50%, var(--p0-them) 100%); }
  .color-btn[data-idx="1"] { background: linear-gradient(135deg, var(--p1-us) 0%, var(--p1-us) 50%, var(--p1-them) 50%, var(--p1-them) 100%); }
  .color-btn[data-idx="2"] { background: linear-gradient(135deg, var(--p2-us) 0%, var(--p2-us) 50%, var(--p2-them) 50%, var(--p2-them) 100%); }
  .color-btn[data-idx="3"] { background: linear-gradient(135deg, var(--p3-us) 0%, var(--p3-us) 50%, var(--p3-them) 50%, var(--p3-them) 100%); }

  /* =========================================
     نافذة الفوز والأرشيف
     ========================================= */
  .winner-content { text-align: center; border: 2px solid; }
  .winner-content.us-win { border-color: var(--us-color); box-shadow: 0 0 20px var(--us-glow); }
  .winner-content.them-win { border-color: var(--them-color); box-shadow: 0 0 20px var(--them-glow); }
  .winner-icon { font-size: 4rem; margin-bottom: 10px; }
  .winner-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; }
  .winner-score { font-size: 1.4rem; margin-bottom: 20px; font-weight: 700; }
  .btn-new-game { background: linear-gradient(135deg, var(--us-color), var(--them-color)); color: #fff; }
  .btn-back { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; cursor: pointer; }

  .text-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'Tajawal'; margin-bottom: 10px; font-size: 0.9rem; outline: none; }
  .text-area { resize: none; height: 80px; }
  
  .archive-list { list-style: none; margin-top: 10px; }
  .archive-item { background: var(--surface2); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
  .archive-item:hover { background: var(--surface); border-color: var(--us-color); }
  .archive-item-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-dim); }
  .archive-item-score { font-size: 1.2rem; font-weight: 800; text-align: center; }
  
  .details-box { background: var(--surface2); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); font-size: 0.95rem; line-height: 1.6; text-align: right; }
  .details-box h4 { margin-bottom: 10px; color: var(--us-color); text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
  .details-round { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--border); padding: 5px 0; }
  
  .btn-share { background: #1da1f2; color: #fff; }
  .btn-delete { background: var(--danger); color: #fff; }

  /* =========================================
     شاشة التحميل (Splash)
     ========================================= */
  .splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; text-align: center; flex-direction: column; }
  .splash-screen.hidden { opacity: 0; visibility: hidden; }
  .spinner { width: 45px; height: 45px; border: 4px solid var(--surface2); border-top-color: var(--us-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }  
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4fffb0">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body data-palette="0">

<div id="splash-screen" class="splash-screen">
  <div class="splash-content" style="display: flex; flex-direction: column; align-items: center;">
    
    <img src="https://raw.githubusercontent.com/ajmiq9/Blot/e8fc9203c81d6ca284735d23438b12bf6c91241a/icon-192.png" 
         alt="App Icon" 
         style="width: 300px; height: 300px; border-radius: 40px; margin-top: -150px; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); object-fit: cover;">
    
    <h1 class="splash-title" style="margin-bottom:20px">حاسبة البلوت</h1>
    <div class="spinner"></div>
    <p style="font-weight:700; color:var(--text-dim)">تطوير: سلطان</p>
  </div>
</div>

<div class="app">

  <div class="scoreboard">
    <div class="score-card us">
      <div class="score-label">لنا</div>
      <div class="score-value" id="score-us">0</div>
    </div>
    <div class="vs-divider">
      <button class="btn-settings-inline" onclick="toggleModal('settings-modal')">⚙️</button>
      <div class="vs-text">ضد</div>
      <button class="btn-speaker" onclick="speakScore()">🔊</button>
    </div>
    <div class="score-card them">
      <div class="score-label">لهم</div>
      <div class="score-value" id="score-them">0</div>
    </div>
  </div>

  <div class="input-section">
    <div class="input-row">
      <div class="input-group us">
        <label>لنا</label>
        <input type="number" id="input-us" placeholder="0" inputmode="numeric">
      </div>
      <div class="input-group them">
        <label>لهم</label>
        <input type="number" id="input-them" placeholder="0" inputmode="numeric">
      </div>
    </div>
    <div class="action-row">
      <button class="btn-action" id="btn-reset" onclick="resetGame()" disabled>صكة<br>جديدة</button>
      <button class="btn-register" onclick="register()">تسجيل</button>
      <button class="btn-action" id="btn-undo" onclick="undo()" disabled>تراجع<br><span style="font-size: 1.4rem; margin-top: 2px;">⟲</span></button>
    </div>
  </div>

  <div class="history-section">
    <ul class="history-list" id="history-list">
      <li class="empty-state" id="empty-state">لم يتم تسجيل أبناط بعد</li>
    </ul>
  </div>

  <div class="modal" id="settings-modal">
    <div class="modal-content">
      <div class="settings-header"><span>الإعدادات</span><button class="close-btn" onclick="toggleModal('settings-modal')">×</button></div>
      
      <div class="setting-group">
        <button class="btn-toggle-theme" onclick="openArchiveModal()" style="background:var(--us-color); color:#fff; text-shadow:1px 1px 2px rgba(0,0,0,0.5);">سجل الصكات المحفوظة 🗂️</button>
      </div>

      <div class="setting-group"><button class="btn-toggle-theme" onclick="toggleTheme()">تبديل المظهر 🌓</button></div>
      
      <div class="setting-group">
        <label>ألوان الفريقين:</label>
        <div class="color-themes">
          <button class="color-btn" data-idx="0" onclick="setThemePalette('0', this)"></button>
          <button class="color-btn" data-idx="1" onclick="setThemePalette('1', this)"></button>
          <button class="color-btn" data-idx="2" onclick="setThemePalette('2', this)"></button>
          <button class="color-btn" data-idx="3" onclick="setThemePalette('3', this)"></button>
        </div>
      </div>
      
      <div class="setting-group">
        <label>مؤثرات الفوز والخسارة:</label>
        <select id="sound-select" onchange="saveSoundSetting()" class="text-input" style="margin:0;">
          <option value="random">عشوائي</option>
          <option value="0">ضحك</option>
          <option value="1">دجاج</option>
          <option value="2">أسم أمك</option>
          <option value="3">أنكارا ميسي</option>
        </select>
      </div>

      <div class="setting-group">
        <label>صوت القارئ (الناطق):</label>
        <select id="voice-select" onchange="saveVoice()" class="text-input" style="margin:0;">
          <option value="">جاري تجهيز الأصوات...</option>
        </select>
      </div>
      
      <div class="setting-group" style="display:flex;justify-content:space-between;align-items:center">
        <label style="margin:0;">منع إقفال الشاشة:</label>
        <input type="checkbox" id="wake-lock-toggle" onchange="toggleWakeLock()" style="transform:scale(1.5);">
      </div>
    </div>
  </div>

  <div class="modal" id="edit-modal">
    <div class="modal-content">
      <div class="settings-header"><span id="edit-title">تعديل</span><button class="close-btn" onclick="toggleModal('edit-modal')">×</button></div>
      <div class="input-row">
        <div class="input-group us"><label>لنا</label><input type="number" id="edit-us" inputmode="numeric" onfocus="this.select()"></div>
        <div class="input-group them"><label>لهم</label><input type="number" id="edit-them" inputmode="numeric" onfocus="this.select()"></div>
      </div>
      <input type="hidden" id="edit-round-id">
      <button class="btn-save-edit" onclick="saveEdit()">حفظ التعديل ✓</button>
    </div>
  </div>

  <div class="modal" id="winner-modal">
    <div class="modal-content winner-content" id="winner-card">
      <div class="winner-icon" id="winner-icon">🏆</div>
      <div class="winner-title" id="winner-title">فوز!</div>
      <div class="winner-score" id="winner-score">0 - 0</div>
      
      <button class="btn-new-game" onclick="resetAfterWin()">صكة جديدة 🃏</button>
      <button class="btn-toggle-theme" style="background:var(--them-color); color:#fff; text-shadow:1px 1px 2px rgba(0,0,0,0.5);" onclick="openSaveGameModal()">حفظ الصكة 💾</button>
      <button class="btn-back" onclick="toggleModal('winner-modal')">العودة للنشرة</button>
    </div>
  </div>

  <div class="modal" id="save-game-modal">
    <div class="modal-content">
      <div class="settings-header"><span>حفظ الصكة</span><button class="close-btn" onclick="toggleModal('save-game-modal')">×</button></div>
      
      <div class="setting-group us">
        <label style="color: var(--us-color);">أسماء فريق (لنا):</label>
        <div style="display: flex; gap:10px;">
          <input type="text" id="player-us-1" class="text-input" placeholder="اللاعب الأول">
          <input type="text" id="player-us-2" class="text-input" placeholder="اللاعب الثاني">
        </div>
      </div>

      <div class="setting-group them">
        <label style="color: var(--them-color);">أسماء فريق (لهم):</label>
        <div style="display: flex; gap:10px;">
          <input type="text" id="player-them-1" class="text-input" placeholder="اللاعب الأول">
          <input type="text" id="player-them-2" class="text-input" placeholder="اللاعب الثاني">
        </div>
      </div>

      <div class="setting-group">
        <label>ملاحظات (اختياري):</label>
        <textarea id="game-note" class="text-input text-area" placeholder="اكتب ملاحظة حول الصكة..."></textarea>
      </div>

      <button class="btn-save-edit" onclick="saveGameToArchive()">تأكيد الحفظ ✓</button>
    </div>
  </div>

  <div class="modal" id="archive-modal">
    <div class="modal-content">
      <div class="settings-header"><span>الأرشيف</span><button class="close-btn" onclick="toggleModal('archive-modal')">×</button></div>
      <ul class="archive-list" id="archive-list-container"></ul>
    </div>
  </div>

  <div class="modal" id="archive-details-modal">
    <div class="modal-content">
      <div class="settings-header"><span>تفاصيل الصكة</span><button class="close-btn" onclick="toggleModal('archive-details-modal')">×</button></div>
      
      <div id="archive-details-content"></div>

      <input type="hidden" id="current-archive-id">
      <button class="btn-toggle-theme btn-share" onclick="shareArchive()">مشاركة الصكة 📤</button>
      <button class="btn-toggle-theme btn-delete" onclick="deleteArchive()">حذف الصكة 🗑️</button>
    </div>
  </div>

</div>

<script>
  // ==========================================
  // المتغيرات الأساسية
  // ==========================================
  let totalUs = 0, totalThem = 0, history = [], round = 0, voices = [], wakeLock = null;
  let savedArchive = []; 
  
  const effectSounds = [
    'https://www.myinstants.com/media/sounds/africa-crying-laugh-commercial.mp3', 
    'https://www.myinstants.com/media/sounds/dnlwd-sdy-mrg-mynkhrft.mp3',         
    'https://www.myinstants.com/media/sounds/-audiotrimmer_9dvaFN0.mp3',          
    'https://www.myinstants.com/media/sounds/ankara-messi.mp3'                    
  ];
  let currentAudio = null; 
  // ==========================================
  // إعدادات البداية والتحميل
  // ==========================================
  window.onload = function() {
    loadData();
    loadSettings();
    loadArchive(); 
    
    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = populateVoices;
      populateVoices();
      
      const voiceSelect = document.getElementById('voice-select');
      if (voiceSelect) {
        voiceSelect.addEventListener('mousedown', populateVoices);
        voiceSelect.addEventListener('touchstart', populateVoices);
      }
    }

    setTimeout(() => document.getElementById('splash-screen').classList.add('hidden'), 3000);
  };

  function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
  }

  // ==========================================
  // إدارة المظهر والألوان
  // ==========================================
  function toggleTheme() {
    const isLight = document.body.classList.toggle('light-theme');
    localStorage.setItem('baloot_theme', isLight ? 'light' : 'dark');
    updateMetaColor();
  }

  function setThemePalette(index, btn) {
    document.body.setAttribute('data-palette', index);
    localStorage.setItem('baloot_palette', index);
    
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    if(btn) {
      btn.classList.add('active');
    } else {
      const btns = document.querySelectorAll('.color-btn');
      if(btns[index]) btns[index].classList.add('active');
    }
    updateMetaColor();
  }

  function updateMetaColor() {
    const metaThemeColor = document.querySelector('meta[name="theme-color"]');
    if (metaThemeColor) {
      const style = getComputedStyle(document.body);
      metaThemeColor.setAttribute('content', style.getPropertyValue('--us-color').trim());
    }
  }

  function loadSettings() {
    if(localStorage.getItem('baloot_theme') === 'light') document.body.classList.add('light-theme');
    
    const savedPalette = localStorage.getItem('baloot_palette') || '0';
    setThemePalette(savedPalette, null);
    
    const savedSound = localStorage.getItem('baloot_sound_effect');
    if(savedSound) { document.getElementById('sound-select').value = savedSound; }
  }

  function saveSoundSetting() {
    localStorage.setItem('baloot_sound_effect', document.getElementById('sound-select').value);
  }

  async function toggleWakeLock() {
    if (document.getElementById('wake-lock-toggle').checked) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
    } else if(wakeLock) { wakeLock.release(); wakeLock = null; }
  }

  // ==========================================
  // منطق اللعبة وتسجيل النقاط
  // ==========================================
  function register() {
    const inputUsElement = document.getElementById('input-us');
    const inputThemElement = document.getElementById('input-them');
    
    const us = parseInt(inputUsElement.value) || 0;
    const them = parseInt(inputThemElement.value) || 0;
    
    if (us === 0 && them === 0) return;
    
    round++;
    totalUs += us; totalThem += them;
    history.push({round, us, them});
    
    inputUsElement.value = '';
    inputThemElement.value = '';
    inputUsElement.blur();
    inputThemElement.blur();

    updateUI();
    // التأكد أنها ليست الجولة الأخيرة
    if (totalUs < 152 && totalThem < 152) {
      // التأكد أن مجموع النقاط 16 أو أكثر، وأن أحد الفريقين نتيجته صفر
      if ((us + them) >= 16 && (us === 0 || them === 0)) {
        const zeroSounds = ['mafeh_mstwa.mp3', 'Klk.mp3', 'Feh_a7d.mp3', 'Mstwak_nem.mp3'];
        const randomAudio = zeroSounds[Math.floor(Math.random() * zeroSounds.length)];
        
        // إيقاف أي قراءة سابقة معلقة احتياطياً
        window.speechSynthesis.cancel();
        
        let customAudio = new Audio(randomAudio);
        customAudio.play();
        
        // تشغيل الناطق الآلي مباشرة بعد انتهاء المقطع الصوتي
        customAudio.onended = function() {
          speakScore();
        };
      } else {
        // إذا كانت جولة عادية (لا يوجد صفر)، اقرأ النتيجة مباشرة
        speakScore();
      }
    }
    checkWin();
  }

  function checkWin() {
    if (totalUs >= 152 || totalThem >= 152) {
      document.getElementById('input-us').blur();
      document.getElementById('input-them').blur();
      
      const card = document.getElementById('winner-card');
      const title = document.getElementById('winner-title');
      card.classList.remove('us-win', 'them-win');
      
      if (totalUs >= 152 && totalUs > totalThem) {
        card.classList.add('us-win'); 
        title.innerText = "مبروك فزتوا! 🎉";
      } else {
        card.classList.add('them-win'); 
        title.innerText = "هاردلك فازوا! 💔";
      }

      if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }

      const selectedOption = document.getElementById('sound-select').value;
      let soundUrl = '';
      if(selectedOption === 'random') {
        soundUrl = effectSounds[Math.floor(Math.random() * effectSounds.length)];
      } else {
        soundUrl = effectSounds[parseInt(selectedOption)];
      }

      currentAudio = new Audio(soundUrl);
      currentAudio.play();

      document.getElementById('winner-score').innerText = `لنا ${totalUs} - لهم ${totalThem}`;
      toggleModal('winner-modal');
    }
  }

  function openEditModal(rNum) {
    const data = history.find(h => h.round === rNum);
    document.getElementById('edit-round-id').value = rNum;
    document.getElementById('edit-us').value = data.us;
    document.getElementById('edit-them').value = data.them;
    document.getElementById('edit-title').innerText = `تعديل الجولة ${rNum}`;
    toggleModal('edit-modal');
  }

  function saveEdit() {
    const rNum = parseInt(document.getElementById('edit-round-id').value);
    const idx = history.findIndex(h => h.round === rNum);
    history[idx].us = parseInt(document.getElementById('edit-us').value) || 0;
    history[idx].them = parseInt(document.getElementById('edit-them').value) || 0;
    totalUs = history.reduce((s, c) => s + c.us, 0);
    totalThem = history.reduce((s, c) => s + c.them, 0);
    updateUI();
    toggleModal('edit-modal');
    if (totalUs < 152 && totalThem < 152) {
      const currentUs = parseInt(document.getElementById('edit-us').value) || 0;
      const currentThem = parseInt(document.getElementById('edit-them').value) || 0;

      if ((currentUs + currentThem) >= 16 && (currentUs === 0 || currentThem === 0)) {
        const zeroSounds = ['mafeh_mstwa.mp3', 'Klk.mp3', 'Feh_a7d.mp3', 'Mstwak_nem.mp3'];
        const randomAudio = zeroSounds[Math.floor(Math.random() * zeroSounds.length)];
        
        window.speechSynthesis.cancel();
        let customAudio = new Audio(randomAudio);
        customAudio.play();
        
        customAudio.onended = function() {
          speakScore();
        };
      } else {
        speakScore();
      }
    }
    checkWin();
  }

  function undo() {
    if (history.length === 0) return;
    history.pop();
    round = history.length > 0 ? history[history.length-1].round : 0;
    totalUs = history.reduce((s, c) => s + c.us, 0);
    totalThem = history.reduce((s, c) => s + c.them, 0);
    updateUI();
  }

  function resetGame() {
    if(!confirm("بدء صكة جديدة؟")) return;
    resetAfterWin();
  }

  function resetAfterWin() {
    if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
    totalUs = 0; totalThem = 0; history = []; round = 0;
    updateUI();
    if(document.getElementById('winner-modal').style.display === 'flex') { toggleModal('winner-modal'); }
  }

  function updateUI() {
    document.getElementById('score-us').innerText = totalUs;
    document.getElementById('score-them').innerText = totalThem;
    document.getElementById('score-us').classList.add('bump');
    document.getElementById('score-them').classList.add('bump');
    setTimeout(() => { document.getElementById('score-us').classList.remove('bump'); document.getElementById('score-them').classList.remove('bump'); }, 300);
    
    document.getElementById('btn-undo').disabled = history.length === 0;
    document.getElementById('btn-reset').disabled = history.length === 0;
    
    const list = document.getElementById('history-list');
    if(history.length === 0) { list.innerHTML = '<li class="empty-state">لم يتم تسجيل أبناط بعد</li>'; }
    else {
      list.innerHTML = [...history].reverse().map(h => `
        <li class="history-item" onclick="openEditModal(${h.round})">
          <div class="history-score us">+${h.us}</div>
          <span class="round-badge">جولة ${h.round}</span>
          <div class="history-score them">+${h.them}</div>
        </li>`).join('');
    }
    localStorage.setItem('baloot_data', JSON.stringify({totalUs, totalThem, history, round}));
  }

  function loadData() {
    const d = JSON.parse(localStorage.getItem('baloot_data') || '{}');
    if(d.history) { totalUs = d.totalUs; totalThem = d.totalThem; history = d.history; round = d.round; updateUI(); }
  }

  // ==========================================
  // أرشيف الصكات
  // ==========================================
  function loadArchive() { savedArchive = JSON.parse(localStorage.getItem('baloot_archive') || '[]'); }

  function openSaveGameModal() {
    toggleModal('winner-modal');
    document.getElementById('player-us-1').value = '';
    document.getElementById('player-us-2').value = '';
    document.getElementById('player-them-1').value = '';
    document.getElementById('player-them-2').value = '';
    document.getElementById('game-note').value = '';
    toggleModal('save-game-modal'); 
  }

  function saveGameToArchive() {
    const pUs1 = document.getElementById('player-us-1').value || 'لاعب 1';
    const pUs2 = document.getElementById('player-us-2').value || 'لاعب 2';
    const pThem1 = document.getElementById('player-them-1').value || 'لاعب 1';
    const pThem2 = document.getElementById('player-them-2').value || 'لاعب 2';
    const note = document.getElementById('game-note').value || 'لا يوجد ملاحظات';

    const now = new Date();
    const dateStr = now.toLocaleDateString('ar-KW');
    const timeStr = now.toLocaleTimeString('ar-KW', {hour: '2-digit', minute:'2-digit'});
    
    const gameRecord = {
      id: Date.now(), date: dateStr, time: timeStr, scoreUs: totalUs, scoreThem: totalThem,
      playersUs: `${pUs1} و ${pUs2}`, playersThem: `${pThem1} و ${pThem2}`, note: note, rounds: [...history]
    };

    savedArchive.push(gameRecord);
    localStorage.setItem('baloot_archive', JSON.stringify(savedArchive));
    
    toggleModal('save-game-modal');
    resetAfterWin();
    alert('تم حفظ الصكة بنجاح في الأرشيف 🗂️');
  }

  function openArchiveModal() {
    toggleModal('settings-modal'); 
    const listContainer = document.getElementById('archive-list-container');
    if(savedArchive.length === 0) {
      listContainer.innerHTML = '<li class="empty-state">لا يوجد صكات محفوظة حالياً</li>';
    } else {
      listContainer.innerHTML = [...savedArchive].reverse().map(game => `
        <li class="archive-item" onclick="viewArchiveDetails(${game.id})">
          <div class="archive-item-header"><span>📅 ${game.date}</span><span>⏰ ${game.time}</span></div>
          <div class="archive-item-score"><span style="color:var(--us-color)">لنا: ${game.scoreUs}</span> | <span style="color:var(--them-color)">لهم: ${game.scoreThem}</span></div>
        </li>
      `).join('');
    }
    toggleModal('archive-modal');
  }

  function viewArchiveDetails(gameId) {
    const game = savedArchive.find(g => g.id === gameId);
    if(!game) return;
    document.getElementById('current-archive-id').value = gameId;
    
    let roundsHtml = game.rounds.map(r => `
      <div class="details-round"><span style="color:var(--them-color)">+${r.them}</span><span style="color:var(--text-dim)">جولة ${r.round}</span><span style="color:var(--us-color)">+${r.us}</span></div>
    `).join('');

    const contentHtml = `
      <div class="details-box"><h4>النشرة النهائية 🏆</h4><div style="text-align:center; font-size:1.5rem; font-weight:900; margin-bottom:10px;"><span style="color:var(--us-color)">${game.scoreUs}</span> - <span style="color:var(--them-color)">${game.scoreThem}</span></div><div><strong>التاريخ:</strong> ${game.date} | <strong>الوقت:</strong> ${game.time}</div></div>
      <div class="details-box"><h4>اللاعبين 👥</h4><div><strong style="color:var(--us-color)">فريق لنا:</strong> ${game.playersUs}</div><div><strong style="color:var(--them-color)">فريق لهم:</strong> ${game.playersThem}</div></div>
      <div class="details-box"><h4>تفاصيل الجولات 📝</h4><div style="display:flex; justify-content:space-between; margin-bottom:5px; font-weight:bold;"><span>لهم</span><span>الرقم</span><span>لنا</span></div>${roundsHtml}</div>
      <div class="details-box"><h4>الملاحظات 📌</h4><div>${game.note}</div></div>
    `;
    document.getElementById('archive-details-content').innerHTML = contentHtml;
    toggleModal('archive-modal');
    toggleModal('archive-details-modal');
  }

  function shareArchive() {
    const gameId = parseInt(document.getElementById('current-archive-id').value);
    const game = savedArchive.find(g => g.id === gameId);
    if(!game) return;

    let textToShare = `*صكة بلوت 🃏*\nالتاريخ: ${game.date} - ${game.time}\n\n*النتيجة النهائية 🏆*\nلنا (${game.playersUs}): ${game.scoreUs}\nلهم (${game.playersThem}): ${game.scoreThem}\n\n*تفصيل الجولات 📝*\n`;
    game.rounds.forEach(r => { textToShare += `جولة ${r.round} ◀️ لنا: ${r.us} | لهم: ${r.them}\n`; });
    if(game.note && game.note !== 'لا يوجد ملاحظات') { textToShare += `\n*الملاحظات 📌*\n${game.note}\n`; }

    navigator.clipboard.writeText(textToShare).then(() => {
      alert('تم نسخ تفاصيل الصكة بنجاح، يمكنك لصقها وإرسالها! 📤');
    }).catch(err => { alert('حدث خطأ أثناء النسخ.'); });
  }

  function deleteArchive() {
    if(!confirm('هل أنت متأكد من حذف هذه الصكة نهائياً؟ 🗑️')) return;
    const gameId = parseInt(document.getElementById('current-archive-id').value);
    savedArchive = savedArchive.filter(g => g.id !== gameId);
    localStorage.setItem('baloot_archive', JSON.stringify(savedArchive));
    toggleModal('archive-details-modal');
    openArchiveModal(); 
  }

  // ==========================================
  // محرك القارئ الصوتي
  // ==========================================
  function populateVoices() {
    const s = document.getElementById('voice-select');
    if (!s) return; 
    
    let availableVoices = window.speechSynthesis.getVoices();
    voices = availableVoices.filter(v => v.lang.toLowerCase().startsWith('ar'));

    if (voices.length > 0) {
      const savedVoice = localStorage.getItem('baloot_voice');
      s.innerHTML = voices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
      if (savedVoice) { s.value = savedVoice; }
    } else {
      s.innerHTML = '<option value="">اضغط هنا لتحديث الأصوات</option>';
    }
  }

  function saveVoice() { 
    localStorage.setItem('baloot_voice', document.getElementById('voice-select').value); 
  }

  function speakScore() {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel(); 
    
    setTimeout(() => {
      const text = `لنا ${totalUs}، لهم ${totalThem}`;
      const u = new SpeechSynthesisUtterance(text);
      
      const s = document.getElementById('voice-select');
      if (s && s.value) {
        const v = voices.find(v => v.name === s.value);
        if(v) u.voice = v; 
      }
      u.lang = 'ar-SA';
      window.speechSynthesis.speak(u);
    }, 50);
  }

  // ==========================================
  // الانتقال التلقائي الذكي بين حقول الإدخال
  // ==========================================
  document.getElementById('input-us').addEventListener('input', function() {
    if(this.value.length === 2) {
      if(document.getElementById('input-them').value === '') { document.getElementById('input-them').focus(); } 
      // التعديل هنا: تمت إزالة التسجيل التلقائي
    }
  });

  document.getElementById('input-them').addEventListener('input', function() {
    if(this.value.length === 2) {
      if(document.getElementById('input-us').value === '') { document.getElementById('input-us').focus(); } 
      // التعديل هنا: تمت إزالة التسجيل التلقائي
    }
  });

  if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
  
</script>
</body>
</html>
